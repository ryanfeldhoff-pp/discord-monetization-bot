name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the feature you'd like"
      placeholder: "What would you like to see added?"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why is this feature needed?"
      placeholder: "Use case or problem it solves"
  - type: textarea
    id: solution
    attributes:
      label: "Suggested Solution"
      description: "How should this be implemented?"
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any other approaches you've considered"
