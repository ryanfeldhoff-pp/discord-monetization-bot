name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/ --select E,F,W --ignore E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: discord
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://discord:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DISCORD_BOT_TOKEN: test_token
          DISCORD_GUILD_ID: "123456"
          DISCORD_LINKED_ROLE_ID: "123456"
          DISCORD_TIER_ROLE_IDS_BRONZE: "1"
          DISCORD_TIER_ROLE_IDS_SILVER: "2"
          DISCORD_TIER_ROLE_IDS_GOLD: "3"
          DISCORD_TIER_ROLE_IDS_DIAMOND: "4"
          PRIZEPICKS_API_KEY: test_key
          OAUTH_CLIENT_ID: test_client
          OAUTH_CLIENT_SECRET: test_secret
          OAUTH_REDIRECT_URI: http://localhost/callback
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=60 -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit security check
        uses: gaurav-nelson/github-action-bandit@v1
        with:
          path: "src"
          skips: "B101"
