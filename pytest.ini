[pytest]
# Pytest configuration for Discord bot tests

# Enable asyncio mode for async tests
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    asyncio: mark test as async (deselect with '-m "not asyncio"')
    integration: mark test as integration test (slow, requires external services)
    unit: mark test as unit test
    slow: mark test as slow running

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
