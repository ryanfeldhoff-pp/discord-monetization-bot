version: "3.8"\n\nservices:\n  bot:\n    build: .\n    container_name: prizepicks-discord-bot\n    restart: unless-stopped\n    env_file:\n      - .env\n    volumes:\n      - bot-data:/app/data\n      - bot-logs:/app/logs\n    depends_on:\n      - redis\n      - db\n    networks:\n      - bot-network\n    healthcheck:\n      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  redis:\n    image: redis:7-alpine\n    container_name: prizepicks-redis\n    restart: unless-stopped\n    ports:\n      - "6379:6379"\n    volumes:\n      - redis-data:/data\n    networks:\n      - bot-network\n    command: redis-server --appendonly yes\n\n  db:\n    image: postgres:15-alpine\n    container_name: prizepicks-db\n    restart: unless-stopped\n    environment:\n      POSTGRES_DB: prizepicks_discord\n      POSTGRES_USER: ${DB_USER:-prizepicks}\n      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}\n    ports:\n      - "5432:5432"\n    volumes:\n      - postgres-data:/var/lib/postgresql/data\n    networks:\n      - bot-network\n\nvolumes:\n  bot-data:\n  bot-logs:\n  redis-data:\n  postgres-data:\n\nnetworks:\n  bot-network:\n    driver: bridge\n
